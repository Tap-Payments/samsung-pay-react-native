buildscript {
  ext.SamsungPayReactNative = [
    kotlinVersion: "2.0.21",
    minSdkVersion: 24,
    compileSdkVersion: 36,
    targetSdkVersion: 36
  ]

  ext.getExtOrDefault = { prop ->
    if (rootProject.ext.has(prop)) {
      return rootProject.ext.get(prop)
    }

    return SamsungPayReactNative[prop]
  }

  repositories {
    google()
    mavenCentral()
    maven { url 'https://jitpack.io' }
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}

repositories {
  maven { url 'https://jitpack.io' }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

apply plugin: "com.facebook.react"

// Remove RN core codegen output so we don't ship duplicate specs (app already has them).
def codegenJavaDir = file("${buildDir}/generated/source/codegen/java")
tasks.register("stripReactNativeCodegen") {
  doLast {
    def specsDir = new File(codegenJavaDir, "com/facebook/fbreact/specs")
    if (specsDir.exists()) {
      specsDir.deleteDir()
    }
    def viewManagersDir = new File(codegenJavaDir, "com/facebook/react/viewmanagers")
    if (viewManagersDir.exists()) {
      viewManagersDir.listFiles()?.each { f ->
        if (!f.name.startsWith("NativeSamsungPayView")) {
          f.delete()
        }
      }
    }
  }
}
tasks.named("generateCodegenArtifactsFromSchema").configure {
  finalizedBy stripReactNativeCodegen
}

android {
  namespace "com.margelo.nitro.samsungpayreactnative"

  compileSdkVersion getExtOrDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion")
    targetSdkVersion getExtOrDefault("targetSdkVersion")
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lint {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }
}

dependencies {
  compileOnly "com.facebook.react:react-android"
  implementation 'com.github.Tap-Payments:SamsungPay-Android:1.0.7'

  // Transitive dependencies of SamsungPay-Android SDK.
  // JitPack AARs only export 'api' scoped deps in their POM; 'implementation' deps must be
  // declared explicitly here so they are included in the final APK.
  implementation 'com.github.Tap-Payments:TapNetwrok-Android:0.2.2.44'
  implementation 'com.github.Tap-Payments:CommonDataModelsWeb-Andriod:0.0.13'
  implementation 'com.squareup.retrofit2:retrofit:2.9.0'
  implementation 'com.squareup.retrofit2:converter-gson:2.9.0'
  implementation 'com.squareup.okhttp3:logging-interceptor:4.10.0'
  implementation 'com.google.code.gson:gson:2.10'
  implementation 'com.intuit.sdp:sdp-android:1.1.0'
  implementation 'androidx.webkit:webkit:1.11.0'
  implementation 'androidx.lifecycle:lifecycle-livedata-ktx:2.6.2'
  implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.6.2'
  implementation 'androidx.lifecycle:lifecycle-process:2.6.2'
}
